<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>OG VERSION — 47 Studio &amp; Radio</title>
<meta name="description" content="Enter OG VERSION. Choose your experience: 47 Studio — a tattoo studio in Kaunas — or OG Version Radio, a live artist-owned station.">
<link rel="canonical" href="https://ogversion.com/">
<meta name="theme-color" content="#000000">
<meta property="og:type" content="website">
<meta property="og:site_name" content="OG VERSION">
<meta property="og:title" content="OG VERSION — 47 Studio &amp; Radio">
<meta property="og:description" content="Choose your experience: 47 Studio or OG Version Radio.">
<meta property="og:url" content="https://ogversion.com/">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="https://ogversion.com/assets/og-gate.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://ogversion.com/assets/og-gate.jpg">
<link rel="preload" as="image" href="assets/gate-studio.webp" fetchpriority="high">
<link rel="preload" as="image" href="assets/gate-radio.webp" fetchpriority="high">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --ink:#050505;
    --bone:#efece6;
    --ash:#8f8f8b;
    --signal:#c6362b;
    --ease:cubic-bezier(.16,1,.3,1);
    --font:"Helvetica Neue",Helvetica,"Segoe UI",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Space Mono",Menlo,monospace;
  }
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--ink);color:var(--bone);font-family:var(--font);
    overflow:hidden;height:100svh;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }

  /* ---- Brand mark + hint: the only two whispers of chrome ---- */
  .mark{
    position:fixed;top:clamp(1.4rem,3.5vh,2.4rem);left:0;right:0;z-index:30;
    text-align:center;font-family:var(--mono);font-size:.7rem;
    letter-spacing:.42em;text-indent:.42em;color:var(--bone);
    text-transform:uppercase;pointer-events:none;font-weight:400;
    opacity:.86;text-shadow:0 1px 24px rgba(0,0,0,.7);
  }
  .hint{
    position:fixed;bottom:clamp(1.4rem,3.5vh,2.4rem);left:0;right:0;z-index:30;
    text-align:center;font-family:var(--mono);font-size:.62rem;
    letter-spacing:.34em;text-indent:.34em;color:var(--ash);
    text-transform:uppercase;pointer-events:none;
  }

  /* ---- The gate ---- */
  .gate{display:flex;flex-direction:column;height:100svh;width:100%}
  @media (min-width:820px){.gate{flex-direction:row}}

  .panel{
    position:relative;flex:1 1 50%;min-height:0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    text-decoration:none;color:var(--bone);isolation:isolate;
    outline:none;
  }
  /* hairline seam between the two worlds */
  @media (min-width:820px){.panel+.panel::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:1px;z-index:5;
    background:linear-gradient(180deg,transparent,rgba(239,236,230,.14) 30%,rgba(239,236,230,.14) 70%,transparent);
  }}
  @media (max-width:819px){.panel+.panel::before{
    content:"";position:absolute;left:0;right:0;top:0;height:1px;z-index:5;
    background:linear-gradient(90deg,transparent,rgba(239,236,230,.14) 30%,rgba(239,236,230,.14) 70%,transparent);
  }}

  .panel__bg{
    position:absolute;inset:-2%;z-index:1;
    background-size:cover;background-position:center;
    transform:scale(1.04);
    filter:brightness(.66) contrast(1.02) saturate(.92);
    transition:transform 1.1s var(--ease),filter 1.1s var(--ease);
    will-change:transform;
    animation:drift 34s ease-in-out infinite alternate;
  }
  .panel--studio .panel__bg{background-image:url("assets/gate-studio.webp")}
  .panel--radio  .panel__bg{background-image:url("assets/gate-radio.webp")}

  /* legibility + mood veil: a soft dark scrim sits behind the centered
     type; the imagery frames it, top/bottom get a gentle cinematic falloff */
  .panel__bg::after{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(72% 44% at 50% 49%,rgba(5,5,5,.66),rgba(5,5,5,.2) 68%,transparent 100%),
      linear-gradient(180deg,rgba(5,5,5,.46),transparent 30%,transparent 64%,rgba(5,5,5,.52));
  }

  .panel__inner{
    position:relative;z-index:3;text-align:center;padding:2rem;
    transform:translateY(0) scale(1);
    transition:transform 1s var(--ease),opacity 1s var(--ease);
    opacity:0;animation:rise 1.4s var(--ease) forwards;
  }
  .panel--radio .panel__inner{animation-delay:.12s}

  .panel__index{
    display:block;font-family:var(--mono);font-size:.66rem;
    letter-spacing:.4em;text-indent:.4em;color:var(--ash);
    margin-bottom:1.4rem;
  }
  .panel__title{
    font-weight:500;text-transform:uppercase;line-height:.9;
    letter-spacing:.02em;
    font-size:clamp(2.6rem,7.2vw,6.2rem);
    text-shadow:0 2px 40px rgba(0,0,0,.55);
  }
  .panel__title .lo{display:block;font-weight:300;letter-spacing:.16em;
    font-size:.42em;color:var(--bone);opacity:.82;margin-top:.5em}
  .panel__enter{
    display:inline-flex;align-items:center;gap:.7em;
    margin-top:1.8rem;font-family:var(--mono);font-size:.64rem;
    letter-spacing:.32em;text-indent:.32em;text-transform:uppercase;
    color:var(--bone);opacity:0;transform:translateY(8px);
    transition:opacity .7s var(--ease),transform .7s var(--ease);
  }
  .panel__enter svg{width:1.1em;height:1.1em;overflow:visible}

  /* ---- Interactions (pointer) ---- */
  @media (hover:hover) and (pointer:fine){
    .panel__enter{opacity:0}
    .panel:hover .panel__bg,.panel:focus-visible .panel__bg{
      transform:scale(1.09);
      filter:brightness(.98) contrast(1.08) saturate(1);
    }
    .panel:hover .panel__inner,.panel:focus-visible .panel__inner{
      transform:translateY(-6px) scale(1.012);
    }
    .panel:hover .panel__enter,.panel:focus-visible .panel__enter{
      opacity:.9;transform:translateY(0);
    }
    /* dim the world not chosen */
    .gate:has(.panel:hover) .panel:not(:hover) .panel__bg{
      filter:brightness(.4) contrast(.98) saturate(.55) grayscale(.35);
      transform:scale(1.02);
    }
    .gate:has(.panel:hover) .panel:not(:hover) .panel__inner{opacity:.5}
  }
  /* touch: give the enter cue by default */
  @media (hover:none){ .panel__enter{opacity:.85} }

  .panel:focus-visible{outline:1px solid rgba(239,236,230,.7);outline-offset:-10px}
  .panel--studio .panel__enter svg path{stroke:var(--signal)}

  /* ---- Cinematic leave transition ---- */
  .curtain{
    position:fixed;inset:0;z-index:60;background:var(--ink);
    opacity:0;pointer-events:none;transition:opacity .55s var(--ease);
  }
  body.leaving .curtain{opacity:1}
  body.leaving .panel.chosen .panel__bg{transform:scale(1.16);filter:brightness(1.05)}
  body.leaving .panel:not(.chosen){opacity:.2;transition:opacity .5s var(--ease)}
  body.leaving .mark,body.leaving .hint{opacity:0;transition:opacity .3s}

  /* ---- Motion off ---- */
  @media (prefers-reduced-motion:reduce){
    .panel__bg{animation:none;transform:none;transition:none}
    .panel__inner{animation:none;opacity:1}
    .panel__enter{transition:none}
    .curtain{transition:none}
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
  }

  @keyframes drift{
    from{transform:scale(1.04) translate3d(0,0,0)}
    to{transform:scale(1.1) translate3d(0,-1.4%,0)}
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;
    overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
  <h1 class="sr-only">OG VERSION — choose your experience: 47 Studio or Radio</h1>
  <span class="mark" aria-hidden="true">OG Version</span>

  <main class="gate">
    <a class="panel panel--studio" href="/47" aria-label="Enter 47 Studio — tattoo studio in Kaunas">
      <span class="panel__bg" aria-hidden="true"></span>
      <span class="panel__inner">
        <span class="panel__index">01</span>
        <span class="panel__title">47 Studio<span class="lo">Tattoo · Kaunas</span></span>
        <span class="panel__enter" aria-hidden="true">Enter
          <svg viewBox="0 0 24 24" fill="none"><path d="M6 18 18 6M9 6h9v9" stroke="currentColor" stroke-width="1.6" stroke-linecap="square"/></svg>
        </span>
      </span>
    </a>

    <a class="panel panel--radio" href="/radio" aria-label="Enter OG Version Radio — live station">
      <span class="panel__bg" aria-hidden="true"></span>
      <span class="panel__inner">
        <span class="panel__index">02</span>
        <span class="panel__title">Radio<span class="lo">Live · OG Version</span></span>
        <span class="panel__enter" aria-hidden="true">Enter
          <svg viewBox="0 0 24 24" fill="none"><path d="M6 18 18 6M9 6h9v9" stroke="currentColor" stroke-width="1.6" stroke-linecap="square"/></svg>
        </span>
      </span>
    </a>
  </main>

  <span class="hint" aria-hidden="true">Choose your experience</span>
  <div class="curtain" aria-hidden="true"></div>

  <script>
    (function(){
      var reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
      var panels = document.querySelectorAll(".panel");
      panels.forEach(function(p){
        p.addEventListener("click", function(e){
          // let modified clicks (new tab) and reduced-motion pass through
          if (reduce || e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;
          e.preventDefault();
          var href = p.getAttribute("href");
          document.body.classList.add("leaving");
          p.classList.add("chosen");
          window.setTimeout(function(){ window.location.href = href; }, 560);
        });
      });
    })();
  </script>
</body>
</html>
